<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Screenshots: Order Management</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Specific style for this page, which uses elements from the main CSS */
      body {
        background-color: var(--primary-dark);
        color: var(--text-light);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 30px 0;
        font-family: "Inter", sans-serif;
        overflow-x: hidden; /* To prevent unwanted horizontal scroll on mobile */
      }

      .lightbox-content-page {
        background-color: var(--secondary-dark);
        padding: 40px;
        border-radius: 10px;
        max-width: 90%;
        width: 1000px; /* Wider width for the gallery */
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 188, 212, 0.8); /* Blue shadow */
        position: relative; /* Needed to position the buttons */
      }

      /* Override gallery style in the context of this page */
      .screenshot-gallery-modal {
        height: 450px; /* Taller height */
        border: 2px solid var(--accent);
        margin-bottom: 30px;
        position: relative; /* For positioning arrows if they were internal */

        /* The scrolling properties (display: flex, overflow-x: scroll, etc.)
                   are already defined in the style.css file under .screenshot-gallery-modal */
      }

      @media (max-width: 768px) {
        .screenshot-gallery-modal {
          height: 300px;
        }
        .lightbox-content-page {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="lightbox-content-page">
      <h2>Screenshots: Order Management</h2>
      <p style="color: var(--text-muted)">
        Scroll horizontally to see all application steps or use the arrows.
      </p>

      <div class="screenshot-gallery-modal" id="galleryPage">
        <img
          src="Dashboard.png"
          alt="Order Management - Dashboard"
          class="gallery-image-modal"
        />
        <img
          src="MAC.png"
          alt="Order Management - Orders Page"
          class="gallery-image-modal"
        />
        <img
          src="Utenti.png"
          alt="Order Management - Export Form"
          class="gallery-image-modal"
        />
        <img
          src="Materiale.png"
          alt="Order Management - Final Report"
          class="gallery-image-modal"
        />
      </div>

      <button
        class="nav-button prev"
        onclick="scrollGallery('galleryPage', -1)"
      >
        &#10094;
      </button>
      <button class="nav-button next" onclick="scrollGallery('galleryPage', 1)">
        &#10095;
      </button>

      <a href="index.html" class="cta-button">Return to Digital Profile</a>
    </div>

    <script>
      function scrollGallery(galleryId, direction) {
        const gallery = document.getElementById(galleryId);
        if (!gallery) return;

        const scrollAmount = gallery.clientWidth;

        gallery.scrollBy({
          left: scrollAmount * direction,
          behavior: "smooth",
        });
      }
    </script>
  </body>
</html>
